console_title_template = '{{ .Shell }} in {{ .Folder }}'
version = 4
final_space = true

[palette]
black = '#1e1e2e'    # Base
surface = '#313244'  # Surface0
white = '#cdd6f4'    # Text
blue = '#89b4fa'     # Blue
sapphire = '#74c7ec' # Sapphire
lavender = '#b4befe' # Lavender
green = '#a6e3a1'    # Green
mauve = '#cba6f7'    # Mauve
red = '#f38ba8'      # Red
yellow = '#f9e2af'   # Yellow

[secondary_prompt]
template = '<p:mauve,transparent>¯éÂ</><,p:mauve> > </><p:mauve,transparent>¯é░</> '
foreground = 'p:black'
background = 'transparent'

[transient_prompt]
template = '<p:mauve,transparent>¯éÂ</><,p:mauve> {{ .Folder }} </><p:mauve,transparent>¯é░</> '
foreground = 'p:black'
background = 'transparent'

[upgrade]
source = 'cdn'
interval = '168h'
auto = false
notice = false

[[blocks]]
type = 'prompt'
alignment = 'left'
newline = true

[[blocks.segments]]
leading_diamond = '¯éÂ'
trailing_diamond = '¯é░'
template = ' {{ if .SSHSession }}¯«® {{ end }}{{ .UserName }} '
foreground = 'p:black'
background = 'p:mauve'
type = 'session'
style = 'diamond'

[[blocks.segments]]
template = ' ´ü╝ <b>{{ path .Path .Location }}</b> '
foreground = 'p:sapphire'
powerline_symbol = '¯é░'
background = 'p:surface'
type = 'path'
style = 'powerline'

[[blocks.segments]]
template = ' ¯£Ñ <b>{{ .HEAD }}</b>{{ if .BranchStatus }} {{ .BranchStatus }}{{ end }}{{ if .Working.Changed }} ´üä {{ .Working.String }}{{ end }}{{ if .Staging.Changed }} ´üå {{ .Staging.String }}{{ end }} '
foreground = 'p:green'
powerline_symbol = '¯é░'
background = 'p:surface'
type = 'git'
style = 'powerline'
foreground_templates = [
  '{{ if or (.Working.Changed) (.Staging.Changed) }}p:black{{ end }}',
]
background_templates = [
  '{{ if or (.Working.Changed) (.Staging.Changed) }}p:yellow{{ end }}',
]

[[blocks.segments]]
template = ' ´âº '
foreground = 'p:yellow'
powerline_symbol = '¯é░'
background = 'p:surface'
type = 'root'
style = 'powerline'

[[blocks.segments]]
leading_diamond = '<transparent,background>¯é░</>'
trailing_diamond = '¯é┤'
template = ' {{ if gt .Code 0 }}´Çì{{ else }}´Çî{{ end }} '
foreground = 'p:lavender'
background = 'p:surface'
type = 'status'
style = 'diamond'
background_templates = ['{{ if gt .Code 0 }}p:red{{ end }}']
foreground_templates = ['{{ if gt .Code 0 }}p:black{{ end }}']

[[blocks]]
type = 'rprompt'

[[blocks.segments]]
template = '¯£ÿ <b>{{ .Version }}</b>'
foreground = 'p:green'
background = 'transparent'
type = 'node'
style = 'plain'

[[blocks.segments]]
template = '¯êÁ <b>{{ .Version }}</b>'
foreground = 'p:blue'
background = 'transparent'
type = 'python'
style = 'plain'

[[blocks.segments]]
template = '¯×¿ <b>{{ .Version }}</b>'
foreground = 'p:red'                 # Rust looks great in Red/Maroon for Mocha
background = 'transparent'
type = 'rust'
style = 'plain'

[[blocks.segments]]
template = 'at <p:mauve><b>{{ .CurrentDate | date "15:04:05" }}</b></>'
foreground = 'p:white'
background = 'transparent'
type = 'time'
style = 'plain'

[[tooltips]]
leading_diamond = '¯é░'
trailing_diamond = '¯é┤'
template = ' ¯×¡ {{ .Profile }}{{ if .Region }}@{{ .Region }}{{ end }} '
foreground = 'p:black'
background = 'p:blue'
type = 'aws'
style = 'diamond'
tips = ['aws']
