env:
  TERM: xterm-256color
window:
  dimensions:
    columns: 150
    lines: 50
  padding:
    x: 15
    y: 15

  dynamic_padding: false
  decorations: full
  opacity: 0.7
  dynamic_title: true

  class:
    instance: Alacritty
    general: Alacritty

scrolling:
  history: 10000
  multiplier: 3

font:
  size: 10.0
  normal:
    family: FiraCode Nerd Font
    style: Regular
  offset:
    x: 0
    y: 1

draw_bold_text_with_bright_colors: true

mouse:
  hide_when_typing: true

selection:
  semantic_escape_chars: ",│`|:\"' ()[]{}<>\t"
  save_to_clipboard: true

import:
  - ~/.config/alacritty/catppuccin/catppuccin-mocha.yml
