window:
  dimensions:
    columns: 120
    lines: 30
  padding:
    x: 5
    y: 5

  dynamic_padding: false
  decorations: full
  opacity: 1.0
  dynamic_title: true

  class:
    instance: Alacritty
    general: Alacritty

scrolling:
  history: 10000
  multiplier: 3

font:
  size: 7.0
  normal:
    family: JetBrains Mono Nerd Font
    style: Normal
  bold:
    family: JetBrains Mono Nerd Font
    style: Bold
  italic:
    family: JetBrains Mono Nerd Font
    style: Italic
  bold_italic:
    family: JetBrains Mono Nerd Font
    style: Bold Italic
  offset:
    x: 0
    y: 1

draw_bold_text_with_bright_colors: true

mouse:
  hide_when_typing: true

selection:
  semantic_escape_chars: ",│`|:\"' ()[]{}<>\t"
  save_to_clipboard: true
