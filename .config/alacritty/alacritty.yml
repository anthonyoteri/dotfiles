env:
  TERM: xterm-256color
window:
  padding:
    x: 6
    y: 6

  dynamic_padding: false
  decorations: full
  opacity: 0.9

  class:
    instance: Alacritty
    general: Alacritty

scrolling:
  history: 10000
  multiplier: 3

tabspaces: 4

font:
  size: 11.0
  normal:
    family: FiraCode Nerd Font
    style: Regular
  offset:
    x: 0
    y: 1

draw_bold_text_with_bright_colors: true

mouse:
  hide_when_typing: true

mouse_bindings:
  - { mouse: Middle, action: Paste }

selection:
  semantic_escape_chars: ",│`|:\"' ()[]{}<>\t"
  save_to_clipboard: true

dynamic_title: true

import:
  - ~/.config/alacritty/catppuccin/catppuccin-mocha.yml
