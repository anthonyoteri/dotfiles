"$schema" = 'https://starship.rs/config-schema.json'
palette = "catppuccin_mocha"
add_newline = true

[username]
format = "[$user]($style)@"
show_always = true
style_root = "bold green"
style_user = "bold green"

[os]
disabled = true

[hostname]
disabled = false
ssh_only = false
trim_at = "-"
ssh_symbol = "­ƒîÉ "

[directory]
truncate_to_repo = true
truncation_length = 0
truncation_symbol = "¾░│Å "
home_symbol = "´Çò "
format = '[$path]($style)[$read_only]($read_only_style) '

[directory.substitutions]
"Documents" = "¾░êÖ Documents"
"Downloads" = "´ÇÖ  Downloads"
"Music" = "´Çü Music"
"Pictures" = "´Ç¥  Pictures"

[sudo]
disabled = false

[git_status]
ahead = "Ôçí${count}"
behind = "Ôçú${count}"
deleted = "x"
diverged = "ÔçòÔçí${ahead_count}Ôçú${behind_count}"
style = "white"

[cmd_duration]
disabled = false
format = "took [$duration]($style)"
min_time = 500

[fill]
symbol = ' '

[time]
disabled = true
format = " ­ƒòÖ $time($style)\n"
style = "bright-white"
time_format = "%T"

[line_break]
disabled = false

[character]
error_symbol = "[├ù](bold red)"
success_symbol = "[ÔØ»](bold green)"

